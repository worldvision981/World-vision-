<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Hope | Lee Junho Fandom Impact</title>
    <style>
        :root { --wv-orange: #ff6d00; --text-dark: #333333; --bg-gray: #f8f9fa; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: var(--text-dark); margin: 0; padding: 0; background: #fff; }
        nav { background: #fff; padding: 15px 5%; display: flex; justify-content: flex-end; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .btn-donate { background: var(--wv-orange); color: #fff; padding: 12px 25px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; text-decoration: none; }
        .article-header { max-width: 800px; margin: 40px auto; text-align: center; padding: 0 20px; }
        .content-container { max-width: 700px; margin: 0 auto 60px; padding: 0 20px; }
        .featured-image { width: 100%; max-width: 800px; display: block; margin: 20px auto; border-radius: 8px; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 30px; width: 90%; max-width: 450px; border-radius: 10px; position: relative; text-align: center; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        
        /* Form Styles */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .action-btn { background: var(--wv-orange); color: white; border: none; width: 100%; padding: 15px; margin-top: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none; }
        .success-box { color: #2e7d32; background: #e8f5e9; padding: 20px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <button class="btn-donate" onclick="openModal()">Donate Now</button>
</nav>

<header class="article-header">
    <h1>Lee Junho Fandom Impact: Transforming Lives Worldwide</h1>
</header>

<img src="1772889370017.jpg" alt="Impact" class="featured-image">

<main class="content-container">
    <p>The Lee Junho fandom is making a global difference, providing clean water and education to children in need.</p>
    <button class="action-btn" onclick="openModal()">Sponsor a Child Today</button>
</main>

<div class="modal-overlay" id="donationModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div id="step-form">
            <h2 style="margin-top:0;">Sponsorship Details</h2>
            <form id="my-form" action="https://formspree.io/f/xdkwlwlj" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="text" name="country" placeholder="Country" required>
                <input type="number" name="amount" placeholder="Amount ($)" required>
                <select name="method" required>
                    <option value="" disabled selected>Payment Method</option>
                    <option value="Apple Pay">Apple Pay</option>
                    <option value="Card">Apple Card</option>
                    <option value="Bank">Bank Transfer</option>
                </select>
                <button type="submit" class="action-btn" id="submit-button">Submit Sponsorship</button>
            </form>
            <p id="my-form-status"></p>
        </div>

        <div id="thank-you" class="hidden">
            <div class="success-box">
                <h3>Success!</h3>
                <p>Your details have been sent. Please check your email inbox shortly.</p>
            </div>
            <button class="action-btn" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
    var modal = document.getElementById("donationModal");
    function openModal() { modal.style.display = "flex"; }
    function closeModal() { modal.style.display = "none"; }

    var form = document.getElementById("my-form");
    
    async function handleSubmit(event) {
      event.preventDefault();
      var status = document.getElementById("my-form-status");
      var button = document.getElementById("submit-button");
      var formDiv = document.getElementById("step-form");
      var successDiv = document.getElementById("thank-you");
      
      button.disabled = true;
      button.innerText = "Sending...";
      
      var data = new FormData(event.target);
      
      fetch(event.target.action, {
        method: form.method,
        body: data,
        headers: {
            'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          formDiv.classList.add("hidden");
          successDiv.classList.remove("hidden");
          form.reset()
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
            } else {
              status.innerHTML = "Oops! There was a problem submitting your form";
            }
          })
        }
      }).catch(error => {
        status.innerHTML = "Oops! There was a problem connecting to the server";
      }).finally(() => {
        button.disabled = false;
        button.innerText = "Submit Sponsorship";
      });
    }
    form.addEventListener("submit", handleSubmit)
</script>

</body>
                                                           </html>
